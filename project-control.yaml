project_name: system-coach-maintenance-manager
project_type: internal-tool
risk_tier: medium
governance_level: 1
repository_model: single-repo
owner:
  name: Adam Goodwin
  role: owner
technical_lead:
  name: codex session
  role: technical-lead
status: active
environments:
  - dev
  - staging
  - prod
data_classification:
  handles_sensitive_data: false
  handles_money: false
  notes: ""
controls:
  required_docs:
    - README.md
    - docs/architecture.md
    - docs/manual.md
    - docs/roadmap.md
    - docs/deployment-guide.md
    - docs/runbook.md
    - docs/action-runner-contract.md
    - docs/setup-linux.md
    - docs/setup-windows-browser.md
    - docs/release-checklist.md
    - docs/CHANGELOG.md
    - docs/risks/risk-register.md
  machine_enforcement:
    - required-file-check
    - lint
    - tests
    - secret-scan
  action_runner_enabled: true
exceptions: []
agent_controls:
  applicable: true
  autonomy_level: A1
  model_registry:
    - provider: ollama
      model: gemma4:latest
      role: local-coach-engine
  prompt_registry:
    - local-probe-agent-command-set
    - local-ai-coach-system-prompt
    - gemma-request-desk-reasoning-prompt
